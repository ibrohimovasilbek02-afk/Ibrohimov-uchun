<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#4a7c3f"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="110" rx="70" ry="75" fill="#7cb342"/>
  
  <!-- Ears -->
  <ellipse cx="35" cy="75" rx="20" ry="15" fill="#7cb342" transform="rotate(-20 35 75)"/>
  <ellipse cx="165" cy="75" rx="20" ry="15" fill="#7cb342" transform="rotate(20 165 75)"/>
  <ellipse cx="35" cy="75" rx="12" ry="8" fill="#558b2f" transform="rotate(-20 35 75)"/>
  <ellipse cx="165" cy="75" rx="12" ry="8" fill="#558b2f" transform="rotate(20 165 75)"/>
  
  <!-- Eyebrows -->
  <path d="M 55 65 Q 75 55 90 65" stroke="#4a7c3f" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 110 65 Q 125 55 145 65" stroke="#4a7c3f" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Eyes -->
  <ellipse cx="75" cy="80" rx="15" ry="16" fill="white"/>
  <ellipse cx="125" cy="80" rx="15" ry="16" fill="white"/>
  <circle cx="78" cy="82" r="8" fill="#5d4037"/>
  <circle cx="128" cy="82" r="8" fill="#5d4037"/>
  <circle cx="80" cy="79" r="3" fill="white"/>
  <circle cx="130" cy="79" r="3" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="105" rx="12" ry="10" fill="#558b2f"/>
  <circle cx="93" cy="107" r="4" fill="#4a7c3f"/>
  <circle cx="107" cy="107" r="4" fill="#4a7c3f"/>
  
  <!-- Mouth (smiling) -->
  <path d="M 65 130 Q 100 160 135 130" stroke="#4a7c3f" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Doppi (traditional hat) -->
  <path d="M 60 50 Q 100 20 140 50" fill="#1b5e20"/>
  <rect x="55" y="48" width="90" height="8" rx="4" fill="#ffc107"/>
  <path d="M 65 48 Q 100 30 135 48" fill="#2e7d32"/>
  <!-- Doppi pattern -->
  <path d="M 75 42 Q 100 32 125 42" stroke="#ffc107" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
